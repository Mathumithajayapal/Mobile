<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sign Up | Mobilube - Mobile Oil Change</title>
          <link rel="icon" type="image/jpeg" href="images\favicon.webp">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    fontFamily: { 'sans': ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        'ink-black': '#0a0a0a',
                        'charcoal': '#1a1a1a',
                        'dark-charcoal': '#121212',
                        'ruby-mist': '#B83B3B',      
                        'crimson-dark': '#9B2E2E',   
                        'rose-dust': '#C85E5E',      
                        'warm-stone': '#4A2E2E',     
                        'cream-petal': '#FEF8F0',    
                    }
                } 
            } 
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease; }

        /* RTL SUPPORT */
        html[dir="rtl"] .rtl-flip { transform: scaleX(-1); }
        html[dir="rtl"] .text-left { text-align: right !important; }
        html[dir="rtl"] .ml-2 { margin-left: 0; margin-right: 0.5rem; }
        html[dir="rtl"] .pl-11 { padding-left: 1rem; padding-right: 2.75rem; }
        html[dir="rtl"] .left-0 { left: auto; right: 0; }
        html[dir="rtl"] .pl-4 { padding-left: 0; padding-right: 1rem; }
        html[dir="rtl"] .absolute.inset-y-0.left-0 { left: auto; right: 0; }
        html[dir="rtl"] .pr-10 { padding-right: 2.5rem; padding-left: 1rem; }
        html[dir="rtl"] .eye-btn { right: auto; left: 12px; }
        
        /* DARK MODE - Exactly preserved */
        html.dark body { background-color: #0a0a0a !important; }
        html.dark .text-warm-stone, html.dark h1, html.dark h2, html.dark p, html.dark label { color: #FEF8F0 !important; }
        html.dark .text-ruby-mist { color: #E07A7A !important; }
        html.dark .bg-white { background-color: #121212 !important; border-color: #2a2a2a !important; }
        html.dark .input-field { background-color: #1a1a1a !important; border-color: #3a3a3a !important; color: #FEF8F0 !important; }
        html.dark .input-field::placeholder { color: #888888 !important; }
        html.dark .btn-primary-dark { background-color: #2a2a2a !important; color: #E07A7A !important; border: 1px solid #4a2e2e; }
        html.dark .btn-primary-dark:hover { background-color: #3a2a2a !important; }

        /* Floating animation for logo */
        .floating-leaf { animation: floatLeaf 6s ease-in-out infinite; }
        @keyframes floatLeaf {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(4deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* Eye button styling */
        .eye-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            color: #C85E5E;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: color 0.2s ease;
        }
        .eye-btn:hover {
            color: #B83B3B;
        }
        html.dark .eye-btn {
            color: #E07A7A;
        }
        html.dark .eye-btn:hover {
            color: #FEF8F0;
        }
        .input-wrapper {
            position: relative;
            width: 100%;
        }
        /* ensure proper padding for eye button */
        .password-input {
            padding-right: 42px !important;
        }
        html[dir="rtl"] .password-input {
            padding-right: 1rem !important;
            padding-left: 42px !important;
        }
        
        /* DESKTOP: NO SCROLLING ANYWHERE - card fully visible without scroll */
        @media (min-width: 1024px) {
            body {
                overflow: hidden;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            /* Completely remove scroll from card */
            .signup-card {
                overflow: visible !important;
                max-height: none !important;
                height: auto !important;
            }
        }
        
        /* Mobile/tablet: natural scrolling allowed only on body */
        @media (max-width: 1023px) {
            body {
                overflow-y: auto;
                height: auto;
                min-height: 100vh;
            }
            .signup-card {
                margin: 1rem;
            }
        }
        
        /* Compact adjustments for card size reduction - make it fit perfectly without any scroll */
        .compact-card {
            padding: 1.5rem !important;
        }
        @media (min-width: 1024px) {
            .compact-card {
                padding: 1.5rem 2rem !important;
            }
            .logo-area i {
                font-size: 1.75rem !important;
            }
            .logo-area span:first-child {
                font-size: 1.35rem !important;
            }
            .logo-area .logo-subtext {
                font-size: 0.55rem !important;
            }
            .signup-card h1 {
                font-size: 1.5rem !important;
                margin-bottom: 0.2rem !important;
            }
            .signup-card .subhead {
                font-size: 0.7rem !important;
                margin-bottom: 0.5rem !important;
            }
            .form-group-spacing {
                gap: 0.6rem !important;
            }
            .input-field {
                padding-top: 0.5rem !important;
                padding-bottom: 0.5rem !important;
                font-size: 0.8rem !important;
            }
            .signup-card button[type="submit"] {
                padding-top: 0.6rem !important;
                padding-bottom: 0.6rem !important;
                font-size: 0.8rem !important;
            }
            .signup-card .terms-label {
                font-size: 0.65rem !important;
            }
            .signup-card .footer-link {
                margin-top: 0.75rem !important;
                padding-top: 0.6rem !important;
                font-size: 0.7rem !important;
            }
            label {
                font-size: 0.7rem !important;
                margin-bottom: 0.25rem !important;
            }
            .signup-card .space-y-3 {
                margin-top: 0.5rem !important;
            }
            /* Extra compact spacing for all form elements */
            .signup-card form > div {
                margin-bottom: 0 !important;
            }
        }
        
        /* Ensure card height fits within viewport on desktop */
        @media (min-width: 1024px) {
            .signup-card {
                max-width: 420px !important;
                width: 100%;
            }
            .eye-btn {
                font-size: 0.85rem;
            }
            .pl-9 {
                padding-left: 2rem !important;
            }
            html[dir="rtl"] .pl-9 {
                padding-left: 0.75rem !important;
                padding-right: 2rem !important;
            }
        }
    </style>
</head>
<body class="bg-[#FEF8F0] font-sans antialiased">

    <!-- Theme & RTL Toggle Buttons (floating) -->
    <div class="fixed top-4 right-4 flex gap-3 z-50">
        <button id="darkModeToggle" class="w-9 h-9 rounded-full bg-white dark:bg-[#1a1a1a] shadow border border-[#F0CFCF] dark:border-[#3a3a3a] flex items-center justify-center text-[#4A2E2E] dark:text-[#FEF8F0] hover:text-[#B83B3B] transition">
            <i id="darkIcon" class="fas fa-moon text-sm"></i>
        </button>
        <button id="rtlToggle" class="w-9 h-9 rounded-full bg-white dark:bg-[#1a1a1a] shadow border border-[#F0CFCF] dark:border-[#3a3a3a] flex items-center justify-center text-[#4A2E2E] dark:text-[#FEF8F0] font-bold text-xs hover:text-[#B83B3B] transition">
            <span id="rtlLabel">RTL</span>
        </button>
    </div>

    <!-- SIGNUP CARD - ULTRA COMPACT, NO SCROLLING ANYWHERE ON DESKTOP -->
    <div class="signup-card w-full max-w-md lg:max-w-[400px] bg-white rounded-2xl lg:rounded-xl shadow-xl border border-[#F0CFCF] compact-card relative z-10">
        
         <a href="index.html" class="logo-area flex-shrink-0 flex items-center gap-2 group">
                    <div class="flex flex-col leading-tight">
                        <span class="text-[#B83B3B] text-xl md:text-2xl font-bold tracking-tight nav-text">Mobilube</span>
                    </div>
                </a>

        <div class="text-center mb-3 lg:mb-2">
            <h1 class="text-2xl lg:text-[1.5rem] font-bold text-[#4A2E2E] text-warm-stone">Create Account</h1>
            <p class="subhead text-[#6F4B3B] text-xs lg:text-[0.7rem] text-warm-stone opacity-80 mt-0.5">Join Mobilube for effortless mobile maintenance.</p>
        </div>

        <form action="#" method="POST" class="space-y-2.5 lg:space-y-2 form-group-spacing">
            <!-- Full Name -->
            <div>
                <label class="block text-xs lg:text-[0.7rem] font-medium text-[#4A2E2E] mb-0.5 lg:mb-1 text-warm-stone text-left">Full Name</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 lg:pl-3 flex items-center pointer-events-none">
                        <i class="far fa-user text-[#C85E5E] text-xs lg:text-[0.7rem]"></i>
                    </div>
                    <input type="text" class="input-field w-full pl-9 lg:pl-9 pr-3 py-1.5 lg:py-1.5 rounded-xl lg:rounded-lg bg-gray-50/50 dark:bg-transparent border border-[#F0CFCF] focus:outline-none focus:ring-2 focus:ring-[#B83B3B]/20 focus:border-[#B83B3B] text-xs lg:text-[0.8rem] transition-all" placeholder="John Doe">
                </div>
            </div>

            <!-- Phone Number -->
            <div>
                <label class="block text-xs lg:text-[0.7rem] font-medium text-[#4A2E2E] mb-0.5 lg:mb-1 text-warm-stone text-left">Phone Number</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 lg:pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-phone-alt text-[#C85E5E] text-[0.65rem] lg:text-[0.7rem]"></i>
                    </div>
                    <input type="tel" class="input-field w-full pl-9 lg:pl-9 pr-3 py-1.5 lg:py-1.5 rounded-xl lg:rounded-lg bg-gray-50/50 dark:bg-transparent border border-[#F0CFCF] focus:outline-none focus:ring-2 focus:ring-[#B83B3B]/20 focus:border-[#B83B3B] text-xs lg:text-[0.8rem] transition-all" placeholder="+1 (555) 000-0000">
                </div>
            </div>

            <!-- Email Address -->
            <div>
                <label class="block text-xs lg:text-[0.7rem] font-medium text-[#4A2E2E] mb-0.5 lg:mb-1 text-warm-stone text-left">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 lg:pl-3 flex items-center pointer-events-none">
                        <i class="far fa-envelope text-[#C85E5E] text-xs lg:text-[0.7rem]"></i>
                    </div>
                    <input type="email" class="input-field w-full pl-9 lg:pl-9 pr-3 py-1.5 lg:py-1.5 rounded-xl lg:rounded-lg bg-gray-50/50 dark:bg-transparent border border-[#F0CFCF] focus:outline-none focus:ring-2 focus:ring-[#B83B3B]/20 focus:border-[#B83B3B] text-xs lg:text-[0.8rem] transition-all" placeholder="name@example.com">
                </div>
            </div>

            <!-- Password Field with Eye Toggle -->
            <div>
                <label class="block text-xs lg:text-[0.7rem] font-medium text-[#4A2E2E] mb-0.5 lg:mb-1 text-warm-stone text-left">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 lg:pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-[#C85E5E] text-xs lg:text-[0.7rem]"></i>
                    </div>
                    <input type="password" id="passwordField" class="input-field w-full pl-9 lg:pl-9 password-input py-1.5 lg:py-1.5 rounded-xl lg:rounded-lg bg-gray-50/50 dark:bg-transparent border border-[#F0CFCF] focus:outline-none focus:ring-2 focus:ring-[#B83B3B]/20 focus:border-[#B83B3B] text-xs lg:text-[0.8rem] transition-all" placeholder="••••••••">
                    <button type="button" id="togglePassword" class="eye-btn" tabindex="-1">
                        <i class="far fa-eye-slash" id="passwordEyeIcon"></i>
                    </button>
                </div>
            </div>

            <!-- Confirm Password Field with Eye Toggle -->
            <div>
                <label class="block text-xs lg:text-[0.7rem] font-medium text-[#4A2E2E] mb-0.5 lg:mb-1 text-warm-stone text-left">Confirm Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 lg:pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-shield-alt text-[#C85E5E] text-xs lg:text-[0.7rem]"></i>
                    </div>
                    <input type="password" id="confirmPasswordField" class="input-field w-full pl-9 lg:pl-9 password-input py-1.5 lg:py-1.5 rounded-xl lg:rounded-lg bg-gray-50/50 dark:bg-transparent border border-[#F0CFCF] focus:outline-none focus:ring-2 focus:ring-[#B83B3B]/20 focus:border-[#B83B3B] text-xs lg:text-[0.8rem] transition-all" placeholder="••••••••">
                    <button type="button" id="toggleConfirmPassword" class="eye-btn" tabindex="-1">
                        <i class="far fa-eye-slash" id="confirmEyeIcon"></i>
                    </button>
                </div>
            </div>

            <!-- Terms Checkbox with smaller spacing -->
            <div class="flex items-start gap-1.5 py-0.5">
                <input id="terms" type="checkbox" class="mt-0.5 h-3.5 w-3.5 text-[#B83B3B] focus:ring-[#B83B3B] border-[#F0CFCF] rounded cursor-pointer">
                <label for="terms" class="terms-label text-[0.6rem] lg:text-[0.65rem] text-[#4A2E2E] text-warm-stone leading-snug cursor-pointer select-none text-left">
                    I agree to the <a href="#" class="text-[#B83B3B] font-semibold underline">Terms</a> & <a href="#" class="text-[#B83B3B] font-semibold underline">Privacy</a>.
                </label>
            </div>

            <!-- Submit Button - compact -->
            <button type="submit" class="w-full flex justify-center items-center gap-2 bg-[#B83B3B] text-white py-2 lg:py-1.5 rounded-xl lg:rounded-lg text-xs lg:text-[0.8rem] font-bold shadow-md hover:bg-[#9B2E2E] hover:shadow-lg transition-all duration-200 btn-primary-dark">
                Create Account <i class="fas fa-user-plus rtl-flip text-[0.7rem] ml-1"></i>
            </button>
        </form>

        <!-- Sign In Link - compact -->
        <p class="footer-link mt-3 lg:mt-2 text-center text-[0.7rem] lg:text-[0.7rem] text-[#6F4B3B] text-warm-stone border-t border-[#F0CFCF] dark:border-[#2a2a2a] pt-3 lg:pt-2">
            Already have an account? 
            <a href="login.html" class="font-bold text-[#B83B3B] hover:text-[#9B2E2E] transition ml-1">Sign In</a>
        </p>
    </div>

    <script>
        (function() {
            const html = document.documentElement;
            const darkToggle = document.getElementById('darkModeToggle');
            const darkIcon = document.getElementById('darkIcon');
            
            function updateDarkUI(isDark) {
                if(darkIcon) darkIcon.className = isDark ? 'fas fa-sun text-sm' : 'fas fa-moon text-sm';
            }
            if(localStorage.getItem('mobilube_dark') === 'enabled') {
                html.classList.add('dark');
                updateDarkUI(true);
            }
            if(darkToggle) {
                darkToggle.addEventListener('click', () => {
                    const isDark = html.classList.toggle('dark');
                    localStorage.setItem('mobilube_dark', isDark ? 'enabled' : 'disabled');
                    updateDarkUI(isDark);
                });
            }

            const rtlBtn = document.getElementById('rtlToggle');
            const rtlLabel = document.getElementById('rtlLabel');
            function setDirection(dir) {
                html.setAttribute('dir', dir);
                localStorage.setItem('mobilube_dir', dir);
                if(rtlLabel) rtlLabel.innerText = dir === 'rtl' ? 'LTR' : 'RTL';
                // Force reflow for RTL adjustments
                document.body.style.display = 'none';
                document.body.offsetHeight;
                document.body.style.display = '';
            }
            const savedDir = localStorage.getItem('mobilube_dir') || 'ltr';
            setDirection(savedDir);
            if(rtlBtn) {
                rtlBtn.addEventListener('click', () => {
                    setDirection(html.getAttribute('dir') === 'rtl' ? 'ltr' : 'rtl');
                });
            }

            // PASSWORD EYE TOGGLE FUNCTIONALITY
            const passwordInput = document.getElementById('passwordField');
            const togglePasswordBtn = document.getElementById('togglePassword');
            const passwordEyeIcon = document.getElementById('passwordEyeIcon');
            
            if (togglePasswordBtn && passwordInput) {
                togglePasswordBtn.addEventListener('click', function() {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    if (passwordEyeIcon) {
                        if (type === 'password') {
                            passwordEyeIcon.classList.remove('fa-eye');
                            passwordEyeIcon.classList.add('fa-eye-slash');
                        } else {
                            passwordEyeIcon.classList.remove('fa-eye-slash');
                            passwordEyeIcon.classList.add('fa-eye');
                        }
                    }
                });
            }

            const confirmPasswordInput = document.getElementById('confirmPasswordField');
            const toggleConfirmBtn = document.getElementById('toggleConfirmPassword');
            const confirmEyeIcon = document.getElementById('confirmEyeIcon');
            
            if (toggleConfirmBtn && confirmPasswordInput) {
                toggleConfirmBtn.addEventListener('click', function() {
                    const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    confirmPasswordInput.setAttribute('type', type);
                    if (confirmEyeIcon) {
                        if (type === 'password') {
                            confirmEyeIcon.classList.remove('fa-eye');
                            confirmEyeIcon.classList.add('fa-eye-slash');
                        } else {
                            confirmEyeIcon.classList.remove('fa-eye-slash');
                            confirmEyeIcon.classList.add('fa-eye');
                        }
                    }
                });
            }

            // Form validation with password match and terms checkbox
            const form = document.querySelector('form');
            if (form) {
                // Helper to remove error elements
                function removeError(id) {
                    const err = document.getElementById(id);
                    if (err) err.remove();
                }
                
                form.addEventListener('submit', function(e) {
                    const pwd = passwordInput ? passwordInput.value : '';
                    const confirmPwd = confirmPasswordInput ? confirmPasswordInput.value : '';
                    const termsCheck = document.getElementById('terms');
                    let hasError = false;
                    
                    // Remove previous errors
                    removeError('pwdMatchError');
                    removeError('termsError');
                    
                    if (pwd !== confirmPwd) {
                        e.preventDefault();
                        const errorDiv = document.createElement('div');
                        errorDiv.id = 'pwdMatchError';
                        errorDiv.className = 'text-[0.6rem] text-red-600 dark:text-red-400 mt-0.5 ml-1 flex items-center gap-1';
                        errorDiv.innerHTML = '<i class="fas fa-exclamation-circle text-[0.55rem]"></i> Passwords do not match.';
                        if (confirmPasswordInput && confirmPasswordInput.parentElement) {
                            confirmPasswordInput.parentElement.insertAdjacentElement('afterend', errorDiv);
                        }
                        hasError = true;
                    }
                    
                    if (termsCheck && !termsCheck.checked) {
                        e.preventDefault();
                        const termsError = document.createElement('div');
                        termsError.id = 'termsError';
                        termsError.className = 'text-[0.6rem] text-red-600 dark:text-red-400 mt-0.5 ml-1 flex items-center gap-1';
                        termsError.innerHTML = '<i class="fas fa-exclamation-circle text-[0.55rem]"></i> You must agree to the Terms.';
                        const termsContainer = termsCheck.closest('.flex.items-start');
                        if (termsContainer) termsContainer.insertAdjacentElement('afterend', termsError);
                        hasError = true;
                    }
                    
                    if (!hasError) {
                        e.preventDefault();
                        alert('Account created successfully! (Demo)');
                        form.reset();
                        // Reset eye icons to default
                        if(passwordInput) passwordInput.setAttribute('type', 'password');
                        if(confirmPasswordInput) confirmPasswordInput.setAttribute('type', 'password');
                        if(passwordEyeIcon) {
                            passwordEyeIcon.classList.remove('fa-eye');
                            passwordEyeIcon.classList.add('fa-eye-slash');
                        }
                        if(confirmEyeIcon) {
                            confirmEyeIcon.classList.remove('fa-eye');
                            confirmEyeIcon.classList.add('fa-eye-slash');
                        }
                        return false;
                    }
                    return !hasError;
                });
                
                // Clear errors on input change
                if (confirmPasswordInput) {
                    confirmPasswordInput.addEventListener('input', function() {
                        const errorDiv = document.getElementById('pwdMatchError');
                        if (errorDiv) errorDiv.remove();
                    });
                }
                if (passwordInput) {
                    passwordInput.addEventListener('input', function() {
                        const errorDiv = document.getElementById('pwdMatchError');
                        if (errorDiv) errorDiv.remove();
                    });
                }
                const termsCheck = document.getElementById('terms');
                if (termsCheck) {
                    termsCheck.addEventListener('change', function() {
                        const termsError = document.getElementById('termsError');
                        if (termsError && this.checked) termsError.remove();
                    });
                }
            }
            
            // Ensure desktop: NO SCROLLING, card fully visible, no internal scroll
            function fixDesktopScroll() {
                if(window.innerWidth >= 1024) {
                    document.body.style.overflow = 'hidden';
                    document.body.style.height = '100vh';
                    document.body.style.margin = '0';
                    document.body.style.padding = '0';
                    // Ensure card has no scrollbar and fits perfectly
                    const card = document.querySelector('.signup-card');
                    if(card) {
                        card.style.overflow = 'visible';
                        card.style.maxHeight = 'none';
                        card.style.height = 'auto';
                    }
                } else {
                    document.body.style.overflow = '';
                    document.body.style.height = '';
                }
            }
            
            fixDesktopScroll();
            window.addEventListener('resize', fixDesktopScroll);
        })();
    </script>
</body>
</html>
