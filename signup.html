<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sign Up | Mobilube - Mobile Oil Change</title>
    <link rel="icon" type="image/jpeg" href="images\favicon.webp">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    fontFamily: { 'sans': ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        'ink-black': '#0a0a0a',
                        'charcoal': '#1a1a1a',
                        'dark-charcoal': '#121212',
                        'ruby-mist': '#B83B3B',      
                        'crimson-dark': '#9B2E2E',   
                        'rose-dust': '#C85E5E',      
                        'warm-stone': '#4A2E2E',     
                        'cream-petal': '#FEF8F0',    
                    }
                } 
            } 
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease; }

        /* RTL SUPPORT */
        html[dir="rtl"] .rtl-flip { transform: scaleX(-1); }
        html[dir="rtl"] .text-left { text-align: right !important; }
        html[dir="rtl"] .ml-2 { margin-left: 0; margin-right: 0.5rem; }
        html[dir="rtl"] .left-0 { left: auto; right: 0; }
        html[dir="rtl"] .absolute.inset-y-0.left-0 { left: auto; right: 0; }
        html[dir="rtl"] .eye-btn { right: auto; left: 12px; }
        
        /* DARK MODE */
        html.dark body { background-color: #0a0a0a !important; }
        html.dark .text-warm-stone, html.dark h1, html.dark h2, html.dark p, html.dark label { color: #FEF8F0 !important; }
        html.dark .text-ruby-mist { color: #E07A7A !important; }
        html.dark .bg-white { background-color: #121212 !important; border-color: #2a2a2a !important; }
        html.dark .input-field { background-color: #1a1a1a !important; border-color: #3a3a3a !important; color: #FEF8F0 !important; }
        html.dark .input-field::placeholder { color: #888888 !important; }
        html.dark .btn-primary-dark { background-color: #2a2a2a !important; color: #E07A7A !important; border: 1px solid #4a2e2e; }
        html.dark .btn-primary-dark:hover { background-color: #3a2a2a !important; }

        /* Eye button styling */
        .eye-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            color: #C85E5E;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .eye-btn:hover { color: #B83B3B; }
        html.dark .eye-btn { color: #E07A7A; }
        html.dark .eye-btn:hover { color: #FEF8F0; }
        
        .password-input { padding-right: 42px !important; }
        html[dir="rtl"] .password-input {
            padding-right: 1rem !important;
            padding-left: 42px !important;
        }

        /* UNIVERSAL NO-SCROLL & CENTERED LAYOUT */
        html, body {
            overflow: hidden !important; /* Strictly prevents scrolling everywhere */
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
            touch-action: none; /* Prevents mobile pull-to-refresh & swipe scrolls */
        }

        /* ULTRA COMPACT CARD - Enforced globally to prevent floating button overlap */
        .signup-card {
            width: 90%;
            max-width: 380px !important;
            padding: 1.25rem 1.5rem !important;
            overflow: visible !important;
            max-height: none !important;
            height: auto !important;
            z-index: 10;
            box-sizing: border-box;
        }

        /* Aggressive form minimization for mobile & tablet */
        .logo-area span.nav-text { font-size: 1.35rem !important; }
        .signup-card h1 { font-size: 1.25rem !important; margin-bottom: 0.15rem !important; }
        .signup-card .subhead { font-size: 0.65rem !important; margin-bottom: 0.75rem !important; }
        
        .form-group-spacing { display: flex; flex-direction: column; gap: 0.6rem !important; margin-top: 0.25rem !important; }
        .form-group-spacing > div { margin: 0 !important; }
        
        label { font-size: 0.65rem !important; margin-bottom: 0.2rem !important; }
        .input-field { 
            padding-top: 0.45rem !important; 
            padding-bottom: 0.45rem !important; 
            font-size: 0.75rem !important; 
        }
        
        /* Icon positioning fixes for compact inputs */
        .input-field.pl-9 { padding-left: 2rem !important; }
        html[dir="rtl"] .input-field.pl-9 { padding-left: 0.75rem !important; padding-right: 2rem !important; }
        .absolute.inset-y-0.left-0.pl-3 { padding-left: 0.75rem !important; }
        html[dir="rtl"] .absolute.inset-y-0.left-0.pl-3 { padding-left: 0 !important; padding-right: 0.75rem !important; }
        .absolute i { font-size: 0.7rem !important; }
        .eye-btn i { font-size: 0.75rem !important; }

        .signup-card button[type="submit"] { 
            padding-top: 0.5rem !important; 
            padding-bottom: 0.5rem !important; 
            font-size: 0.75rem !important; 
            margin-top: 0.35rem !important;
        }
        .terms-label { font-size: 0.6rem !important; line-height: 1.2; }
        
        .footer-link { 
            margin-top: 0.6rem !important; 
            padding-top: 0.6rem !important; 
            font-size: 0.65rem !important; 
        }
    </style>
</head>
<body class="bg-[#FEF8F0] font-sans antialiased">

    <!-- Theme & RTL Toggle Buttons (Slightly minimized to avoid collision) -->
    <div class="fixed top-3 right-3 flex gap-2.5 z-50">
        <button id="darkModeToggle" class="w-8 h-8 rounded-full bg-white dark:bg-[#1a1a1a] shadow border border-[#F0CFCF] dark:border-[#3a3a3a] flex items-center justify-center text-[#4A2E2E] dark:text-[#FEF8F0] hover:text-[#B83B3B] transition">
            <i id="darkIcon" class="fas fa-moon text-[0.7rem]"></i>
        </button>
        <button id="rtlToggle" class="w-8 h-8 rounded-full bg-white dark:bg-[#1a1a1a] shadow border border-[#F0CFCF] dark:border-[#3a3a3a] flex items-center justify-center text-[#4A2E2E] dark:text-[#FEF8F0] font-bold text-[0.65rem] hover:text-[#B83B3B] transition">
            <span id="rtlLabel">RTL</span>
        </button>
    </div>

    <!-- SIGNUP CARD -->
    <div class="signup-card bg-white rounded-xl shadow-xl border border-[#F0CFCF] relative z-10">
        
        <div class="flex justify-center mb-3">
            <a href="index.html" class="logo-area flex items-center group">
                <div class="flex flex-col leading-tight text-center">
                    <span class="text-[#B83B3B] font-bold tracking-tight nav-text">Mobilube</span>
                </div>
            </a>
        </div>

        <div class="text-center">
            <h1 class="font-bold text-[#4A2E2E] text-warm-stone">Create Account</h1>
            <p class="subhead text-[#6F4B3B] text-warm-stone opacity-80">Join Mobilube for effortless mobile maintenance.</p>
        </div>

        <form action="#" method="POST" class="form-group-spacing">
            <!-- Full Name -->
            <div>
                <label class="block font-medium text-[#4A2E2E] text-warm-stone text-left">Full Name</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="far fa-user text-[#C85E5E]"></i>
                    </div>
                    <input type="text" class="input-field w-full pl-9 pr-3 rounded-lg bg-gray-50/50 dark:bg-transparent border border-[#F0CFCF] focus:outline-none focus:ring-2 focus:ring-[#B83B3B]/20 focus:border-[#B83B3B] transition-all" placeholder="John Doe">
                </div>
            </div>

            <!-- Phone Number -->
            <div>
                <label class="block font-medium text-[#4A2E2E] text-warm-stone text-left">Phone Number</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-phone-alt text-[#C85E5E]"></i>
                    </div>
                    <input type="tel" class="input-field w-full pl-9 pr-3 rounded-lg bg-gray-50/50 dark:bg-transparent border border-[#F0CFCF] focus:outline-none focus:ring-2 focus:ring-[#B83B3B]/20 focus:border-[#B83B3B] transition-all" placeholder="+1 (555) 000-0000">
                </div>
            </div>

            <!-- Email Address -->
            <div>
                <label class="block font-medium text-[#4A2E2E] text-warm-stone text-left">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="far fa-envelope text-[#C85E5E]"></i>
                    </div>
                    <input type="email" class="input-field w-full pl-9 pr-3 rounded-lg bg-gray-50/50 dark:bg-transparent border border-[#F0CFCF] focus:outline-none focus:ring-2 focus:ring-[#B83B3B]/20 focus:border-[#B83B3B] transition-all" placeholder="name@example.com">
                </div>
            </div>

            <!-- Password Field -->
            <div>
                <label class="block font-medium text-[#4A2E2E] text-warm-stone text-left">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-[#C85E5E]"></i>
                    </div>
                    <input type="password" id="passwordField" class="input-field w-full pl-9 password-input rounded-lg bg-gray-50/50 dark:bg-transparent border border-[#F0CFCF] focus:outline-none focus:ring-2 focus:ring-[#B83B3B]/20 focus:border-[#B83B3B] transition-all" placeholder="••••••••">
                    <button type="button" id="togglePassword" class="eye-btn" tabindex="-1">
                        <i class="far fa-eye-slash" id="passwordEyeIcon"></i>
                    </button>
                </div>
            </div>

            <!-- Confirm Password Field -->
            <div>
                <label class="block font-medium text-[#4A2E2E] text-warm-stone text-left">Confirm Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-shield-alt text-[#C85E5E]"></i>
                    </div>
                    <input type="password" id="confirmPasswordField" class="input-field w-full pl-9 password-input rounded-lg bg-gray-50/50 dark:bg-transparent border border-[#F0CFCF] focus:outline-none focus:ring-2 focus:ring-[#B83B3B]/20 focus:border-[#B83B3B] transition-all" placeholder="••••••••">
                    <button type="button" id="toggleConfirmPassword" class="eye-btn" tabindex="-1">
                        <i class="far fa-eye-slash" id="confirmEyeIcon"></i>
                    </button>
                </div>
            </div>

            <!-- Terms Checkbox -->
            <div class="flex items-start gap-1.5 py-0.5 mt-1">
                <input id="terms" type="checkbox" class="mt-0.5 h-3 w-3 text-[#B83B3B] focus:ring-[#B83B3B] border-[#F0CFCF] rounded cursor-pointer">
                <label for="terms" class="terms-label text-[#4A2E2E] text-warm-stone cursor-pointer select-none text-left">
                    I agree to the <a href="#" class="text-[#B83B3B] font-semibold underline">Terms</a> & <a href="#" class="text-[#B83B3B] font-semibold underline">Privacy</a>.
                </label>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full flex justify-center items-center gap-1.5 bg-[#B83B3B] text-white rounded-lg font-bold shadow-md hover:bg-[#9B2E2E] hover:shadow-lg transition-all duration-200 btn-primary-dark">
                Create Account <i class="fas fa-user-plus rtl-flip text-[0.65rem] ml-1"></i>
            </button>
        </form>

        <!-- Sign In Link -->
        <p class="footer-link text-center text-[#6F4B3B] text-warm-stone border-t border-[#F0CFCF] dark:border-[#2a2a2a]">
            Already have an account? 
            <a href="login.html" class="font-bold text-[#B83B3B] hover:text-[#9B2E2E] transition ml-1">Sign In</a>
        </p>
    </div>

    <script>
        (function() {
            const html = document.documentElement;
            
            // DARK MODE TOGGLE
            const darkToggle = document.getElementById('darkModeToggle');
            const darkIcon = document.getElementById('darkIcon');
            function updateDarkUI(isDark) {
                if(darkIcon) darkIcon.className = isDark ? 'fas fa-sun text-[0.7rem]' : 'fas fa-moon text-[0.7rem]';
            }
            if(localStorage.getItem('mobilube_dark') === 'enabled') {
                html.classList.add('dark');
                updateDarkUI(true);
            }
            if(darkToggle) {
                darkToggle.addEventListener('click', () => {
                    const isDark = html.classList.toggle('dark');
                    localStorage.setItem('mobilube_dark', isDark ? 'enabled' : 'disabled');
                    updateDarkUI(isDark);
                });
            }

            // RTL TOGGLE
            const rtlBtn = document.getElementById('rtlToggle');
            const rtlLabel = document.getElementById('rtlLabel');
            function setDirection(dir) {
                html.setAttribute('dir', dir);
                localStorage.setItem('mobilube_dir', dir);
                if(rtlLabel) rtlLabel.innerText = dir === 'rtl' ? 'LTR' : 'RTL';
                document.body.style.display = 'none';
                document.body.offsetHeight;
                document.body.style.display = '';
            }
            const savedDir = localStorage.getItem('mobilube_dir') || 'ltr';
            setDirection(savedDir);
            if(rtlBtn) {
                rtlBtn.addEventListener('click', () => {
                    setDirection(html.getAttribute('dir') === 'rtl' ? 'ltr' : 'rtl');
                });
            }

            // PASSWORD EYE TOGGLES
            const passwordInput = document.getElementById('passwordField');
            const togglePasswordBtn = document.getElementById('togglePassword');
            const passwordEyeIcon = document.getElementById('passwordEyeIcon');
            
            if (togglePasswordBtn && passwordInput) {
                togglePasswordBtn.addEventListener('click', function() {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    if (passwordEyeIcon) {
                        passwordEyeIcon.className = type === 'password' ? 'far fa-eye-slash' : 'far fa-eye';
                    }
                });
            }

            const confirmPasswordInput = document.getElementById('confirmPasswordField');
            const toggleConfirmBtn = document.getElementById('toggleConfirmPassword');
            const confirmEyeIcon = document.getElementById('confirmEyeIcon');
            
            if (toggleConfirmBtn && confirmPasswordInput) {
                toggleConfirmBtn.addEventListener('click', function() {
                    const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    confirmPasswordInput.setAttribute('type', type);
                    if (confirmEyeIcon) {
                        confirmEyeIcon.className = type === 'password' ? 'far fa-eye-slash' : 'far fa-eye';
                    }
                });
            }

            // FORM VALIDATION
            const form = document.querySelector('form');
            if (form) {
                function removeError(id) {
                    const err = document.getElementById(id);
                    if (err) err.remove();
                }
                
                form.addEventListener('submit', function(e) {
                    const pwd = passwordInput ? passwordInput.value : '';
                    const confirmPwd = confirmPasswordInput ? confirmPasswordInput.value : '';
                    const termsCheck = document.getElementById('terms');
                    let hasError = false;
                    
                    removeError('pwdMatchError');
                    removeError('termsError');
                    
                    if (pwd !== confirmPwd) {
                        e.preventDefault();
                        const errorDiv = document.createElement('div');
                        errorDiv.id = 'pwdMatchError';
                        errorDiv.className = 'text-[0.6rem] text-red-600 dark:text-red-400 mt-0.5 ml-1 flex items-center gap-1';
                        errorDiv.innerHTML = '<i class="fas fa-exclamation-circle text-[0.55rem]"></i> Passwords do not match.';
                        if (confirmPasswordInput && confirmPasswordInput.parentElement) {
                            confirmPasswordInput.parentElement.insertAdjacentElement('afterend', errorDiv);
                        }
                        hasError = true;
                    }
                    
                    if (termsCheck && !termsCheck.checked) {
                        e.preventDefault();
                        const termsError = document.createElement('div');
                        termsError.id = 'termsError';
                        termsError.className = 'text-[0.6rem] text-red-600 dark:text-red-400 mt-0.5 ml-1 flex items-center gap-1';
                        termsError.innerHTML = '<i class="fas fa-exclamation-circle text-[0.55rem]"></i> You must agree to the Terms.';
                        const termsContainer = termsCheck.closest('.flex.items-start');
                        if (termsContainer) termsContainer.insertAdjacentElement('afterend', termsError);
                        hasError = true;
                    }
                    
                    if (!hasError) {
                        e.preventDefault();
                        alert('Account created successfully! (Demo)');
                        form.reset();
                        if(passwordInput) passwordInput.setAttribute('type', 'password');
                        if(confirmPasswordInput) confirmPasswordInput.setAttribute('type', 'password');
                        if(passwordEyeIcon) passwordEyeIcon.className = 'far fa-eye-slash';
                        if(confirmEyeIcon) confirmEyeIcon.className = 'far fa-eye-slash';
                        return false;
                    }
                    return !hasError;
                });
                
                if (confirmPasswordInput) {
                    confirmPasswordInput.addEventListener('input', () => removeError('pwdMatchError'));
                }
                if (passwordInput) {
                    passwordInput.addEventListener('input', () => removeError('pwdMatchError'));
                }
                const termsCheck = document.getElementById('terms');
                if (termsCheck) {
                    termsCheck.addEventListener('change', function() {
                        if (this.checked) removeError('termsError');
                    });
                }
            }
        })();
    </script>
</body>
</html>
